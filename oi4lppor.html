<title>20周年纪念版要来 《超越善恶》原版游戏下架停售</title>
随着20周年纪念版即将到来，育碧《超越善恶》原版游戏正在从数字商店下架。　　V社Steam商店上写着：&ldquo;应发行商要求，《超越善恶》已从Steam下架，并且不会在搜索中出现。&rdquo;　　虽然该作仍然在GOG上出售，但Xbox商城也已下架这款游戏。　　育碧表示他们计划在本周四公布《超越善恶》20周年纪念版游戏的消息。该作将在Limited Run Games上登场，而该活动将于6月21日凌晨2点直播。
